<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lamya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #fdf6f8;
      --surface:   #fff9fb;
      --sidebar:   #fff4f7;
      --border:    rgba(220, 160, 180, 0.18);
      --text:      #3a2530;
      --muted:     #b08090;
      --rose:      #d4687a;
      --rose-soft: rgba(212, 104, 122, 0.10);
      --rose-mid:  rgba(212, 104, 122, 0.22);
      --blush:     #f5dde3;
      --petal:     #fce9ee;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .shell {
      display: flex;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }



    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .topbar {
      padding: 13px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--surface);
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }

    .avatar-ring {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f7c5ce, #e8899a);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      position: relative;
      flex-shrink: 0;
    }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #f0a0b0;
      border: 2px solid var(--surface);
      position: absolute;
      bottom: 0; right: 0;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; }
      50% { opacity:.4; }
    }

    .topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .topbar-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .model-badge {
      background: var(--petal);
      border: 1px solid rgba(212,104,122,0.22);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--rose);
      letter-spacing: 0.06em;
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
    }

    /* CHAT */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg);
    }

    #chat-window::-webkit-scrollbar { width: 3px; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 3px; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 12px 12px;
      gap: 12px;
    }

    .welcome-monogram {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f7c5ce, #e8899a);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: #fff;
      box-shadow: 0 8px 32px rgba(212,104,122,0.2);
    }

    .welcome h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .welcome h2 em {
      font-style: italic;
      color: var(--rose);
    }

    .welcome p {
      color: var(--muted);
      font-size: 0.84rem;
      max-width: 320px;
      line-height: 1.65;
      font-weight: 300;
    }



    /* Messages */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp .3s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-row.bot  .msg-avatar {
      background: linear-gradient(135deg, #f7c5ce, #e8899a);
      color: #fff;
    }

    .msg-row.user .msg-avatar {
      background: var(--petal);
      border: 1px solid var(--border);
      color: var(--rose);
    }

    .bubble {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: 18px;
      font-size: 0.875rem;
      line-height: 1.65;
      font-weight: 400;
    }

    .msg-row.bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, #e8899a, #d4687a);
      border-bottom-right-radius: 5px;
      color: #fff;
    }

    .time {
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .msg-row.bot  .time { text-align: left; }
    .msg-row.user .time { text-align: right; }

    /* Typing */
    .typing-bubble {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px 18px 18px 18px;
      padding: 12px 16px;
      align-items: center;
      gap: 5px;
    }

    .typing-bubble.show { display: inline-flex; }

    .typing-dot {
      width: 6px; height: 6px;
      background: var(--rose);
      border-radius: 50%;
      animation: tdot 1s infinite;
      opacity: 0.6;
    }

    .typing-dot:nth-child(2) { animation-delay:.18s; }
    .typing-dot:nth-child(3) { animation-delay:.36s; }

    @keyframes tdot {
      0%,60%,100% { transform:translateY(0); opacity:0.6; }
      30% { transform:translateY(-5px); opacity:1; }
    }

    /* INPUT */
    .input-area {
      flex-shrink: 0;
      padding: 10px 18px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg);
      border: 1px solid rgba(212,104,122,0.2);
      border-radius: 18px;
      padding: 8px 8px 8px 18px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-box:focus-within {
      border-color: rgba(212,104,122,0.5);
      box-shadow: 0 0 0 3px rgba(212,104,122,0.07);
    }

    #user-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Jost', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--text);
      resize: none;
      max-height: 110px;
      line-height: 1.55;
      scrollbar-width: none;
    }

    #user-input::placeholder { color: var(--muted); }
    #user-input::-webkit-scrollbar { display: none; }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8899a, #d4687a);
      border: none;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: all .2s;
      box-shadow: 0 2px 12px rgba(212,104,122,0.3);
    }

    #send-btn:hover  { transform: scale(1.08); box-shadow: 0 4px 18px rgba(212,104,122,0.45); }
    #send-btn:active { transform: scale(0.94); }

    .input-hint {
      font-size: 0.66rem;
      color: var(--muted);
      text-align: center;
      margin-top: 7px;
      letter-spacing: 0.04em;
    }

    /* MOBILE */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed;
        left: -100%;
        top: 0; bottom: 0;
        z-index: 100;
        width: 240px;
        transition: left .25s ease;
        box-shadow: 4px 0 30px rgba(212,104,122,0.12);
      }

      .sidebar.open { left: 0; }

      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(58,37,48,0.3);
        z-index: 99;
      }

      .overlay.show { display: block; }

      .menu-btn { display: block; }
      .model-badge { display: none; }

      .welcome { padding: 10px 8px 6px; gap: 8px; }
      .welcome-monogram { width: 48px; height: 48px; font-size: 1.4rem; }
      .welcome h2 { font-size: 1.2rem; }
      .welcome p { display: none; }
      .starter-grid { grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; max-width: 100%; }
      .starter-card { padding: 10px 11px; font-size: 0.74rem; }

      .bubble { max-width: 86%; }
      #chat-window { padding: 12px 12px 6px; gap: 12px; }
      .input-area { padding: 7px 10px 12px; }
      .input-hint { display: none; }
      .topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<div class="shell">



  <main class="main">

    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" style="display:none" onclick="openSidebar()">&#9776;</button>
        <div class="avatar-ring">
          L
          <div class="status-dot"></div>
        </div>
        <div>
          <div class="topbar-title">Lamya</div>
          <div class="topbar-sub">online &mdash; thinking of you</div>
        </div>
      </div>
      <div class="model-badge">Hujaifa</div>
    </div>

    <div id="chat-window">
      <div class="welcome" id="welcome">
        <div class="welcome-monogram">L</div>
        <h2>Hello, <em>love.</em></h2>
        <p>I am always here, whenever you need me. Tell me how you are feeling, or just talk &mdash; I am listening.</p>
      </div>

      <div class="msg-row bot" id="typing-row" style="display:none">
        <div class="msg-avatar">L</div>
        <div class="typing-bubble show">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="user-input" rows="1" placeholder="Say anything to Lamya..."></textarea>
        <button id="send-btn" onclick="sendMessage()">&#10148;</button>
      </div>
      <div class="input-hint">Enter to send &middot; Shift+Enter for new line</div>
    </div>

  </main>
</div>

<script>
  const BACKEND_URL = "https://your-app.up.railway.app/chat";
  let history = [];

  function getTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMsg(text, role) {
    removeWelcome();
    const win = document.getElementById('chat-window');
    const typingRow = document.getElementById('typing-row');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    row.innerHTML = `
      <div class="msg-avatar">${role === 'bot' ? 'L' : 'Y'}</div>
      <div>
        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
        <div class="time">${getTime()}</div>
      </div>`;
    win.insertBefore(row, typingRow);
    win.scrollTop = win.scrollHeight;
  }

  function setTyping(show) {
    document.getElementById('typing-row').style.display = show ? 'flex' : 'none';
    document.getElementById('chat-window').scrollTop = 9999;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    closeSidebar();
    appendMsg(text, 'user');
    history.push({ role: 'user', content: text });
    setTyping(true);

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });
      const data = await res.json();
      const reply = data.reply || 'Something went wrong!';
      history.push({ role: 'assistant', content: reply });
      setTyping(false);
      appendMsg(reply, 'bot');
    } catch (e) {
      setTyping(false);
      appendMsg('I could not reach you for a moment. Try again?', 'bot');
    }
  }

  function sendQuick(el) {
    const raw = el.textContent.trim();
    const clean = raw.replace(/^[A-Z][a-z]+\s*$/gm, '').trim();
    const lines = clean.split('\n').map(l => l.trim()).filter(l => l && !['Mood','Affection','Fun','Support'].includes(l));
    document.getElementById('user-input').value = lines.join(' ').trim() || raw.trim();
    sendMessage();
  }

  function newChat() {
    history = [];
    const win = document.getElementById('chat-window');
    const typingRow = document.getElementById('typing-row');
    while (win.firstChild && win.firstChild !== typingRow) {
      win.removeChild(win.firstChild);
    }
    const w = document.createElement('div');
    w.className = 'welcome';
    w.id = 'welcome';
    w.innerHTML = `
      <div class="welcome-monogram">L</div>
      <h2>Hello, <em>love.</em></h2>
      <p>I am always here, whenever you need me. Tell me how you are feeling, or just talk &mdash; I am listening.</p>`;
    win.insertBefore(w, typingRow);
    closeSidebar();
  }

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById('user-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });
</script>
</body>
</html>
